#Celtic
celtic_pagan: "Celtic"
celtic_pagan_religion_desc: "An ancient polytheistic tradition rooted in the myths, rituals, and sacred landscapes of the Celtic peoples. Centered around reverence for nature, ancestor worship, and a pantheon led by deities, Celtic paganism sustained rich oral lore and druidic customs for centuries."
celtic_pagan_rebels_demand: "Convert $COUNTRYNAME$"
celtic_pagan_rebels_demand_desc: "The religious rebels fight for the $RELIGION$ religion. They demand that we recognize its supremacy or at the very least cease our efforts to convert them and let them worship in peace."
celtic_pagan_rebels_title: "Religious"
celtic_pagan_rebels_name: "$RELIGION$ Zealots"
celtic_pagan_rebels_desc: "Religious fanatics tend to rise up in provinces controlled by nations of a different faith. They seek to spread their faith and smite all unbelievers."
celtic_pagan_rebels_army: "$RELIGION$ Army"
#Hellenic
hellenic_pagan: "Hellenic"
hellenic_pagan_religion_desc: "The ancient polytheistic traditions of Greece, centered around the Olympian gods such as Zeus, Athena, and Apollo. Hellenic religion blended mythology, ritual sacrifice, oracles, and civic cults into a worldview that shaped philosophy, politics, and identity for centuries."
