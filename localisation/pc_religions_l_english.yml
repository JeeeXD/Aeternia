#Egyptian
egyptian_pagan: "Kemetic"
egyptian_pagan_religion_desc: "The ancient faith of the Nile Valley, centered on deities such as Ra, Osiris, Isis, and Amun. Kemetic religion intertwined divine kingship, temple cults, elaborate funerary rites, and a cosmic order known as Ma'at, sustaining one of history's oldest civilizations."
