#Finnish
finnish_pagan: "Suomenusko"
finnish_pagan_religion_desc: "An ancient Finno-Ugric belief system centered on animism, ancestor spirits, and deities such as Ukko, Tapio, and Ahti. Deeply tied to the forests, lakes, and natural forces of the north, Finnish paganism preserved a rich tradition of myth and ritual magic."
