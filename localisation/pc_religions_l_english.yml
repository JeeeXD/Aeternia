romuva_pagan: "Romuva"
romuva_pagan_religion_desc: "The Baltic pagan tradition, venerating gods such as Dievas, Perkunas, and Laima. Rooted in sacred groves, seasonal rites, and strong priestly authority, Romuva preserved one of Europe’s last indigenous polytheistic systems into the medieval era."
