#### EVENTS ####
ET_Timurids.0.t: "The Caucasus Breaks Away"
ET_Timurids.0.d: "With the death of Shah Rukh, the foundations of our empire tremble once more. Across the rugged Caucasus, local rulers sense weakness and seize their moment. The emirs, begs, and mountain clans declare their independence, refusing to acknowledge our authority.\n\nOur armies are stretched thin, our succession insecure, and the memory of previous revolts weighs heavily on the court. Shall we concede their autonomy to preserve internal stability, or muster our forces to bring the Caucasus to heel once again?"
ET_Timurids.0.a: "Grant them their independence. We cannot afford another war."
ET_Timurids.0.b: "They will kneel to Timur’s heirs. Crush the rebellion!"
ET_Timurids.1.t: "The Caucasus Restored"
ET_Timurids.1.d: "Our armies have triumphed, and the lands of the Caucasus now lie once more under our authority. Their rulers have been subdued, their fortresses opened, and the mountain passes secured.\n\nNow the question remains: should we re-establish our direct rule and bind these lands to us as loyal Timurid vassals, or permit the current arrangement to stand and avoid further unrest in this volatile region?"
ET_Timurids.1.a: "Reinstate Timurid overlordship. They will serve us again."
ET_Timurids.1.b: "Leave the situation as it is."
ET_Timurids.2.t: "The Turkish Beyliks Revolt"
ET_Timurids.2.d: "With the passing of Shah Rukh, the western marches of our realm have grown restless. The Turkish beyliks, long kept in check only by the strength of our court, have seized the moment to declare their independence.\n\nThe region has always been troublesome to govern, distant from our true centers of power. We must now decide how to answer this open defiance."
ET_Timurids.2.a: "Let them go. Those lands were never worth the trouble."
ET_Timurids.2.b: "No, prepare the armies. We will crush this rebellion."
