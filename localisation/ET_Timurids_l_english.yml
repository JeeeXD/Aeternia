#Timurid Vassal
timurid_vassal: "Timurid Vassal"
timurid_vassal_long_desc: "A Timurid vassal is a semi-autonomous vassal paying a small amount of tribute monthly to the capital inexchange for protection from both our wrath and invasion of others."
timurid_vassal_is_our: "$NAME|Y$ is our Timurid Vassal"
timurid_vassal_title: "Timurid Vassal"
timurid_vassal_title_plural: "Timurid Vassals"
is_timurid_vassal: "Is Timurid Vassal"
