l_english:
conquest_by_marriage: "Conquest by Marriage"
conquest_by_marriage_desc: "Territory need not always be taken by force. Through careful dynastic marriages, inheritance claims, and family alliances, expansion can be achieved with ink and ceremony rather than bloodshed."

grand_secretariat: "Grand Secretariat"
grand_secretariat_desc: "A powerful central secretariat coordinates diplomacy, correspondence, and state affairs. With a Grand Secretary overseeing foreign relations, negotiations become more efficient and consistent."

merchant_diplomats: "Merchant Diplomats"
merchant_diplomats_desc: "Merchants often know foreign courts better than envoys. By relying on trade networks and commercial ties, diplomacy is conducted through profit, contracts, and mutual interest."

academy_of_warfare: "Academy of Warfare"
academy_of_warfare_desc: "Formal military education replaces improvisation. By training officers in tactics, logistics, and command, the state produces capable generals prepared for modern warfare."

nobility_knights: "Noble Knights"
nobility_knights_desc: "Mounted nobles form the elite core of the army. Their wealth allows them to equip themselves as heavy cavalry, serving as shock troops on the battlefield."

peasant_levies: "Peasant Levies"
peasant_levies_desc: "In times of war, large numbers of peasants are called to arms. Though poorly trained, their sheer numbers allow the state to field massive armies when needed."

pomeranian_duchy: "Kingdom in Name Only"
pomeranian_duchy_desc: "Though its rulers claim royal dignity, Pomerania remains recognized as a duchy by its peers. This careful balance allows greater prestige without provoking immediate opposition."

fleet_of_restoration: "Fleet of Restoration"
fleet_of_restoration_desc: "After the destruction of much of the French fleet during the last war with the southern duchies, the Crown has committed itself to rebuilding from the ground up. New shipyards work at full pace, producing warships meant not only to replace what was lost, but to prepare for renewed conflict against the Catholic powers of the south and the fleets of Iberia."

hereditary_offices: "Hereditary Offices"
hereditary_offices_desc: "Positions of authority are passed down within noble families, binding the aristocracy to the state while limiting opportunities for reform and merit-based advancement."

noble_tax_exemptions: "Noble Tax Exemptions"
noble_tax_exemptions_desc: "To secure their loyalty, the nobility is granted broad exemptions from taxation. While this strengthens aristocratic support, it shifts the burden of revenue onto the rest of the realm."

private_jurisdiction: "Private Jurisdiction"
private_jurisdiction_desc: "Local nobles are entrusted with administering justice within their own lands. This reduces unrest and administrative costs, but weakens central oversight and uniform law."

charter_of_noble_liberties: "Charter of Noble Liberties"
charter_of_noble_liberties_desc: "The traditional rights and privileges of the nobility are formally recognized in law. In return for their loyalty, the Crown accepts clear limits on its authority over the aristocracy."

professional_civil_service: "Professional Civil Service"
professional_civil_service_desc: "Government offices are staffed by trained professionals rather than favored nobles. Competence and experience increasingly replace birth as the basis of authority."

inspection_and_audit: "Inspection and Audit"
inspection_and_audit_desc: "Inspectors travel the realm to review officials and accounts. Mismanagement is punished, and local autonomy steadily curtailed."

rule_by_decree: "Rule by Decree"
rule_by_decree_desc: "With the machinery of administration firmly in place, the ruler governs through decrees issued from the center. Authority is swift, but resentment grows."
